services:
  broadcaster:
    build: .
    container_name: fs-telegram-bot
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/app/data/notices.db').execute('SELECT 1')"]
      interval: 6h
      timeout: 10s
      retries: 3
      start_period: 30s
