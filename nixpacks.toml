[phases.setup]
nixPkgs = ["python3", "gcc", "chromium", "libxcb", "libx11", "libxcomposite", "libxcursor", "libxdamage", "libxext", "libxfixes", "libxi", "libxrandr", "libxrender", "libxss", "libxtst", "cups", "dbus", "at-spi2-core", "nspr", "nss", "mesa", "alsa-lib", "pango", "cairo", "gtk3", "libdrm"]

[phases.install]
commands = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
  ". /opt/venv/bin/activate && python -m playwright install chromium"
]

[start]
cmd = "python src/main.py"
